# configs/yolo_Y3.yaml
#
# Y3 — Higher resolution (imgsz=800).
# Hypothesis: finer fracture edge features (subtle cortical breaks) may be
# missed at 600-640px; 800px preserves more spatial detail.
#
# NOTE: 800px requires more VRAM. With 6GB, use batch=8.
# Default YOLO batch=16 will OOM at this resolution.
#
# Same split as Y1B: Y0B (635 train, auto optimizer, seed=42).
# epochs=200, patience=50.
#
# Run commands:
#   python main.py --config configs/yolo_Y3.yaml --task Y3_localization
#   python main.py --config configs/yolo_Y3.yaml --task Y3_segmentation

# ── Y3 Localization ──────────────────────────────────────────────────────── #

Y3_localization:
  experiment_id : "Y3_detect"
  task          : "detect"
  model_weights : "yolov8s.pt"
  data_yaml     : "data/dataset_yolo_Y0B/data.yaml"
  epochs        : 200
  patience      : 50
  imgsz         : 800
  batch         : 8
  device        : "0"
  plot          : true

# ── Y3 Segmentation ──────────────────────────────────────────────────────── #

Y3_segmentation:
  experiment_id : "Y3_seg"
  task          : "segment"
  model_weights : "yolov8s-seg.pt"
  data_yaml     : "data/dataset_yolo_seg_Y0B/data.yaml"
  epochs        : 200
  patience      : 50
  imgsz         : 800
  batch         : 8
  device        : "0"
  plot          : true
