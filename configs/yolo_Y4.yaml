# configs/yolo_Y4.yaml
#
# Y4 — YOLOv8m (medium model, 25.9M params vs 11.2M for YOLOv8s).
# Hypothesis: stronger capacity + COCO pre-training reduces overfit risk
# on 635 training images and may extract richer fracture features.
#
# imgsz=600 kept constant vs Y1B baseline to isolate model capacity effect.
# Same split as Y1B: Y0B (635 train, auto optimizer, seed=42).
# epochs=200, patience=50.
#
# Run commands:
#   python main.py --config configs/yolo_Y4.yaml --task Y4_localization
#   python main.py --config configs/yolo_Y4.yaml --task Y4_segmentation

# ── Y4 Localization ──────────────────────────────────────────────────────── #

Y4_localization:
  experiment_id : "Y4_detect"
  task          : "detect"
  model_weights : "yolov8m.pt"
  data_yaml     : "data/dataset_yolo_Y0B/data.yaml"
  epochs        : 200
  patience      : 50
  imgsz         : 600
  device        : "0"
  plot          : true

# ── Y4 Segmentation ──────────────────────────────────────────────────────── #

Y4_segmentation:
  experiment_id : "Y4_seg"
  task          : "segment"
  model_weights : "yolov8m-seg.pt"
  data_yaml     : "data/dataset_yolo_seg_Y0B/data.yaml"
  epochs        : 200
  patience      : 50
  imgsz         : 600
  device        : "0"
  plot          : true
